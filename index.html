<html lang="en">
<head>
 <meta charset="UTF-8">

 <title>Docs</title>
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; user-select: none; }
 #game-container { position: absolute; inset: 0; }

 /* ── Realistic Military HUD ── */
 #hud { position: absolute; inset: 0; pointer-events: none; display: none; }

 .hud-panel {
 position: absolute;
 color: #b8cc88;
 font-size: 13px;
 font-weight: bold;
 letter-spacing: 0.08em;
 text-transform: uppercase;
 }

 /* Bottom-left: health */
 #health-wrap {
 bottom: 28px; left: 24px;
 display: flex; flex-direction: column; gap: 4px;
 }
 #health-label { color: #7a9a4a; font-size: 10px; letter-spacing: 0.15em; }
 #health-bar-bg {
 width: 140px; height: 6px; background: rgba(255,255,255,0.12);
 border: 1px solid rgba(255,255,255,0.15);
 }
 #health-bar { height: 100%; background: #6aaa2a; transition: width 0.3s, background 0.3s; width: 100%; }
 #health-val { font-size: 22px; color: #c8e888; text-shadow: 0 0 8px rgba(100,200,50,0.5); }

 /* Bottom-right: ammo */
 #ammo-wrap {
 bottom: 28px; right: 24px; text-align: right;
 }
 #ammo-label { color: #7a9a4a; font-size: 10px; letter-spacing: 0.15em; }
 #ammo-count { font-size: 36px; color: #e8d888; text-shadow: 0 0 10px rgba(200,180,50,0.4); line-height: 1; }
 #ammo-reserve { font-size: 14px; color: #8a8a5a; }
 #reload-text { font-size: 11px; color: #cc8844; letter-spacing: 0.2em; opacity: 0; transition: opacity 0.2s; }

 /* Top-left: wave info */
 #wave-wrap {
 top: 24px; left: 24px;
 background: rgba(0,0,0,0.45);
 border-left: 3px solid #6aaa2a;
 padding: 8px 14px;
 }
 #wave-label { font-size: 10px; color: #7a9a4a; letter-spacing: 0.15em; }
 #wave-val { font-size: 20px; color: #b8cc88; }

 /* Top-right: enemies */
 #enemies-wrap {
 top: 24px; right: 24px; text-align: right;
 background: rgba(0,0,0,0.45);
 border-right: 3px solid #aa4422;
 padding: 8px 14px;
 }
 #enemies-label { font-size: 10px; color: #7a5a4a; letter-spacing: 0.15em; }
 #enemies-val { font-size: 20px; color: #cc8866; }

 /* Center crosshair */
 #crosshair {
 position: absolute; top: 50%; left: 50%;
 transform: translate(-50%, -50%);
 width: 4px; height: 4px;
 }
 .ch-line {
 position: absolute; background: rgba(200,220,150,0.85);
 }
 #ch-t { width: 1px; height: 8px; left: 1.5px; bottom: 7px; }
 #ch-b { width: 1px; height: 8px; left: 1.5px; top: 7px; }
 #ch-l { height: 1px; width: 8px; right: 7px; top: 1.5px; }
 #ch-r { height: 1px; width: 8px; left: 7px; top: 1.5px; }
 #ch-dot { width: 2px; height: 2px; background: rgba(220,240,160,0.9); left: 1px; top: 1px; border-radius: 50%; }

 /* Hit vignette */
 #hit-overlay {
 position: absolute; inset: 0; pointer-events: none;
 background: radial-gradient(ellipse at center, transparent 50%, rgba(180,40,20,0.7) 100%);
 opacity: 0; transition: opacity 0.12s;
 }
 /* Slide vignette */
 #speed-overlay {
 position: absolute; inset: 0; pointer-events: none;
 background: radial-gradient(ellipse at center, transparent 55%, rgba(20,40,10,0.5) 100%);
 opacity: 0; transition: opacity 0.25s;
 }

 /* Ammo pip indicators */
 #ammo-pips { display: flex; gap: 2px; justify-content: flex-end; margin-top: 5px; flex-wrap: wrap; max-width: 180px; }
 .pip { width: 6px; height: 14px; background: #888855; border-radius: 1px; transition: background 0.1s; }
 .pip.active { background: #ddcc44; }

 /* ── Blocker / Menu ── */
 #blocker {
 position: absolute; inset: 0;
 background: radial-gradient(ellipse at center, #1a1a0e 0%, #0a0a04 100%);
 display: flex; flex-direction: column; align-items: center; justify-content: center;
 color: #b8cc88; z-index: 10;
 }
 #menu-title {
 font-size: 11px; letter-spacing: 0.5em; color: #6aaa2a; margin-bottom: 8px;
 text-transform: uppercase;
 }
 #menu-heading {
 font-size: 52px; font-weight: bold; letter-spacing: 0.05em;
 color: #c8e888; text-shadow: 0 2px 20px rgba(100,180,40,0.4);
 margin-bottom: 40px;
 }
 #start-btn {
 cursor: pointer; text-align: center;
 padding: 18px 48px;
 border: 1px solid #5a8a2a; background: rgba(80,120,30,0.2);
 color: #b8cc88; font-family: 'Courier New', monospace;
 font-size: 14px; letter-spacing: 0.25em; text-transform: uppercase;
 transition: all 0.2s;
 }
 #start-btn:hover { background: rgba(80,120,30,0.5); border-color: #8acc4a; color: #ddff99; }
 #controls-list {
 margin-top: 32px; font-size: 12px; color: #5a7a3a; line-height: 2;
 letter-spacing: 0.1em; text-align: center;
 }
 #controls-list span { color: #8aaa5a; }
 </style>

 <script type="importmap">
 {

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// ═══════════════════════════════════════════════
// AUDIO ENGINE — Realistic Web Audio Synthesis
// ═══════════════════════════════════════════════
const ctx = new (window.AudioContext || window.webkitAudioContext)();

function makeNoise(duration, filterFreq = 2000) {
 const bufSize = ctx.sampleRate * duration;
 const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
 const data = buf.getChannelData(0);
 for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
 const src = ctx.createBufferSource();
 src.buffer = buf;
 const filter = ctx.createBiquadFilter();
 filter.type = 'bandpass';
 filter.frequency.value = filterFreq;
 filter.Q.value = 0.8;
 src.connect(filter);
 return { src, filter, out: filter };
}

const Audio = {
 masterGain: (() => { const g = ctx.createGain(); g.gain.value = 0.6; g.connect(ctx.destination); return g; })(),

 gunshot() {
 if (ctx.state === 'suspended') return;
 const now = ctx.currentTime;

 // Low thump (body)
 const thump = ctx.createOscillator();
 const thumpGain = ctx.createGain();
 thump.type = 'sine';
 thump.frequency.setValueAtTime(160, now);
 thump.frequency.exponentialRampToValueAtTime(40, now + 0.08);
 thumpGain.gain.setValueAtTime(0.9, now);
 thumpGain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
 thump.connect(thumpGain); thumpGain.connect(this.masterGain);
 thump.start(now); thump.stop(now + 0.12);

 // Crack (high-frequency noise)
 const { src: ns, out: nout } = makeNoise(0.08, 4000);
 const ng = ctx.createGain();
 ng.gain.setValueAtTime(0.5, now);
 ng.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
 nout.connect(ng); ng.connect(this.masterGain);
 ns.start(now); ns.stop(now + 0.08);

 // Mid pop
 const pop = ctx.createOscillator();
 const popGain = ctx.createGain();
 pop.type = 'sawtooth';
 pop.frequency.setValueAtTime(600, now);
 pop.frequency.exponentialRampToValueAtTime(120, now + 0.05);
 popGain.gain.setValueAtTime(0.3, now);
 popGain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
 pop.connect(popGain); popGain.connect(this.masterGain);
 pop.start(now); pop.stop(now + 0.05);
 },

 reload() {
 if (ctx.state === 'suspended') return;
 const now = ctx.currentTime;
 // Click 1 – mag eject
 this._metalClick(now, 800, 0.06, 0.15);
 // Click 2 – mag seat
 this._metalClick(now + 0.55, 500, 0.1, 0.2);
 // Click 3 – charge handle
 this._metalClick(now + 0.85, 1100, 0.04, 0.18);
 },

 _metalClick(when, freq, dur, vol) {
 const osc = ctx.createOscillator();
 const g = ctx.createGain();
 const filter = ctx.createBiquadFilter();
 filter.type = 'highpass'; filter.frequency.value = 500;
 osc.type = 'square'; osc.frequency.value = freq;
 g.gain.setValueAtTime(vol, when);
 g.gain.exponentialRampToValueAtTime(0.001, when + dur);
 osc.connect(filter); filter.connect(g); g.connect(this.masterGain);
 osc.start(when); osc.stop(when + dur);
 },

 damage() {
 if (ctx.state === 'suspended') return;
 const now = ctx.currentTime;
 const { src: ns, out: nout } = makeNoise(0.35, 300);
 const ng = ctx.createGain();
 ng.gain.setValueAtTime(0.5, now);
 ng.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
 nout.connect(ng); ng.connect(this.masterGain);
 ns.start(now); ns.stop(now + 0.35);

 const osc = ctx.createOscillator();
 const og = ctx.createGain();
 osc.type = 'sawtooth'; osc.frequency.setValueAtTime(80, now);
 osc.frequency.linearRampToValueAtTime(40, now + 0.3);
 og.gain.setValueAtTime(0.4, now);
 og.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
 osc.connect(og); og.connect(this.masterGain);
 osc.start(now); osc.stop(now + 0.3);
 },

 hit() {
 if (ctx.state === 'suspended') return;
 const now = ctx.currentTime;
 // Dull flesh thud
 const { src: ns, out: nout } = makeNoise(0.06, 800);
 const ng = ctx.createGain();
 ng.gain.setValueAtTime(0.25, now);
 ng.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
 nout.connect(ng); ng.connect(this.masterGain);
 ns.start(now); ns.stop(now + 0.06);
 },

 footstep() {
 if (ctx.state === 'suspended') return;
 const now = ctx.currentTime;
 const { src: ns, out: nout } = makeNoise(0.08, 600);
 const ng = ctx.createGain();
 ng.gain.setValueAtTime(0.08, now);
 ng.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
 nout.connect(ng); ng.connect(this.masterGain);
 ns.start(now); ns.stop(now + 0.08);
 },

 slide() {
 if (ctx.state === 'suspended') return;
 const now = ctx.currentTime;
 const { src: ns, out: nout } = makeNoise(0.4, 400);
 const ng = ctx.createGain();
 ng.gain.setValueAtTime(0.12, now);
 ng.gain.linearRampToValueAtTime(0, now + 0.4);
 nout.connect(ng); ng.connect(this.masterGain);
 ns.start(now); ns.stop(now + 0.4);
 },

 // Ambient wind drone
 startAmbient() {
 if (this._ambientStarted) return;
 this._ambientStarted = true;
 const now = ctx.currentTime;
 const { src: ns, out: nout } = makeNoise(999, 200);
 const ng = ctx.createGain(); ng.gain.value = 0.04;
 const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 300;
 nout.connect(lp); lp.connect(ng); ng.connect(this.masterGain);
 ns.start(now);
 this._ambNoise = ns;
 },

 stopAmbient() {
 if (this._ambNoise) { try { this._ambNoise.stop(); } catch(e){} this._ambNoise = null; this._ambientStarted = false; }
 }
};

// ═══════════════════════════════════════════════
// TEXTURE GENERATOR — Realistic Palette
// ═══════════════════════════════════════════════
function makeTex(fn, size = 256) {
 const c = document.createElement('canvas'); c.width = c.height = size;
 fn(c.getContext('2d'), size);
 const t = new THREE.CanvasTexture(c);
 t.wrapS = t.wrapT = THREE.RepeatWrapping;
 return t;
}

// Dirt / gravel ground
const groundTex = makeTex((ctx, s) => {
 const base = ctx.createImageData(s, s);
 for (let i = 0; i < base.data.length; i += 4) {
 const r = Math.random();
 const v = 60 + r * 40;
 base.data[i] = v + 10;
 base.data[i+1] = v;
 base.data[i+2] = v - 10;
 base.data[i+3] = 255;
 }
 ctx.putImageData(base, 0, 0);
 // Pebbles
 for (let i = 0; i < 80; i++) {
 const x = Math.random()*s, y = Math.random()*s, r = 1 + Math.random()*3;
 ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
 ctx.fillStyle = `rgb(${50+Math.random()*30|0},${45+Math.random()*20|0},${35+Math.random()*15|0})`;
 ctx.fill();
 }
});

// Concrete wall
const concreteTex = makeTex((ctx, s) => {
 const base = ctx.createImageData(s, s);
 for (let i = 0; i < base.data.length; i += 4) {
 const v = 100 + Math.random() * 40;
 base.data[i] = base.data[i+1] = base.data[i+2] = v;
 base.data[i+3] = 255;
 }
 ctx.putImageData(base, 0, 0);
 // Cracks
 ctx.strokeStyle = 'rgba(60,60,60,0.4)'; ctx.lineWidth = 1;
 for (let i = 0; i < 6; i++) {
 ctx.beginPath();
 ctx.moveTo(Math.random()*s, Math.random()*s);
 ctx.lineTo(Math.random()*s, Math.random()*s);
 ctx.stroke();
 }
 // Joints
 ctx.strokeStyle = 'rgba(70,70,70,0.6)'; ctx.lineWidth = 2;
 for (let y = 30; y < s; y += 30) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(s,y); ctx.stroke(); }
 for (let x = 0; x < s; x += 60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,s); ctx.stroke(); }
});

// Sandbag / dirt brown
const sandbagTex = makeTex((ctx, s) => {
 const base = ctx.createImageData(s, s);
 for (let i = 0; i < base.data.length; i += 4) {
 const v = Math.random();
 base.data[i] = 140 + v*30;
 base.data[i+1] = 110 + v*20;
 base.data[i+2] = 70 + v*15;
 base.data[i+3] = 255;
 }
 ctx.putImageData(base, 0, 0);
});

// ═══════════════════════════════════════════════
// GLOBALS
// ═══════════════════════════════════════════════
let camera, scene, renderer, controls;
const mapBounds = [];
let enemies = [], deadEnemies = [], particles = [];
const clock = new THREE.Clock();

// Recoil state (applied to camera pitch ONLY via recoilPitch offset)
let recoilPitch = 0, recoilPitchTarget = 0;
let recoilKick = 0; // gun kick

// Player state
const player = {
 health: 100, ammo: 30, maxAmmo: 30,
 baseSpeed: 10, sprintSpeed: 20,
 velocity: new THREE.Vector3(),
 direction: new THREE.Vector3(),
 isJumping: false, isRunning: false, isSliding: false,
 slideTimer: 0, slideDuration: 0.75,
 baseHeight: 1.65, slideHeight: 0.85,
 currentHeight: 1.65,
 radius: 0.45,
 moveF: false, moveB: false, moveL: false, moveR: false
};

let wave = 1, enemiesAlive = 0, isGameOver = false;
let gunMesh, gunGroup, muzzleLight, bobbingTime = 0, targetFov = 72, baseFov = 72;
let reloading = false, dmgCD = false;
let footstepTimer = 0;
const defGunPos = new THREE.Vector3(0.28, -0.28, -0.48);

init(); animate();

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function init() {
 scene = new THREE.Scene();
 scene.background = new THREE.Color(0x7a8a99); // overcast sky
 scene.fog = new THREE.FogExp2(0x9aaa99, 0.018);

 camera = new THREE.PerspectiveCamera(baseFov, innerWidth / innerHeight, 0.05, 800);
 camera.position.set(0, player.baseHeight, 0);

 renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
 renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
 renderer.setSize(innerWidth, innerHeight);
 renderer.shadowMap.enabled = true;
 renderer.shadowMap.type = THREE.PCFSoftShadowMap;
 renderer.toneMapping = THREE.ACESFilmicToneMapping;
 renderer.toneMappingExposure = 0.85;
 document.getElementById('game-container').appendChild(renderer.domElement);

 // Lighting — overcast day
 scene.add(new THREE.AmbientLight(0xd0d8c8, 0.8));

 const sun = new THREE.DirectionalLight(0xfff0d8, 1.2);
 sun.position.set(30, 60, -20);
 sun.castShadow = true;
 sun.shadow.mapSize.set(2048, 2048);
 sun.shadow.camera.near = 0.5;
 sun.shadow.camera.far = 200;
 sun.shadow.camera.left = -60; sun.shadow.camera.right = 60;
 sun.shadow.camera.top = 60; sun.shadow.camera.bottom = -60;
 sun.shadow.bias = -0.001;
 scene.add(sun);

 // Subtle fill light from opposite
 const fill = new THREE.DirectionalLight(0xc8d8ff, 0.3);
 fill.position.set(-20, 10, 30);
 scene.add(fill);

 controls = new PointerLockControls(camera, document.body);
 document.getElementById('start-btn').addEventListener('click', () => {
 if (!isGameOver) { ctx.resume(); controls.lock(); }
 });

 controls.addEventListener('lock', () => {
 document.getElementById('blocker').style.display = 'none';
 document.getElementById('hud').style.display = 'block';
 Audio.startAmbient();
 if (wave === 1 && enemiesAlive === 0) startWave();
 });
 controls.addEventListener('unlock', () => {
 if (!isGameOver) {
 document.getElementById('blocker').style.display = 'flex';
 document.getElementById('hud').style.display = 'none';
 }
 Audio.stopAmbient();
 });
 scene.add(controls.getObject());

 buildMap();
 buildWeapon();
 buildAmmoPips();
 updateHUD();

 document.addEventListener('keydown', onKeyDown);
 document.addEventListener('keyup', onKeyUp);
 document.addEventListener('mousedown', onMouseDown);
 window.addEventListener('resize', onResize);
}

// ═══════════════════════════════════════════════
// MAP — Realistic Military / Urban Ruin
// ═══════════════════════════════════════════════
function buildMap() {
 groundTex.repeat.set(25, 25);
 const ground = new THREE.Mesh(
 new THREE.PlaneGeometry(120, 120),
 new THREE.MeshStandardMaterial({ map: groundTex, roughness: 0.95, metalness: 0 })
 );
 ground.rotation.x = -Math.PI / 2;
 ground.receiveShadow = true;
 scene.add(ground);

 const wallM = new THREE.MeshStandardMaterial({ map: concreteTex, roughness: 0.9 });
 const sandM = new THREE.MeshStandardMaterial({ map: sandbagTex, roughness: 1.0 });

 function addBox(mat, x, y, z, sx, sy, sz, rotY = 0) {
 const m = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz), mat);
 m.position.set(x, y, z);
 m.rotation.y = rotY;
 m.castShadow = true; m.receiveShadow = true;
 scene.add(m); m.updateMatrixWorld();
 mapBounds.push(new THREE.Box3().setFromObject(m));
 }

 // Perimeter walls (concrete)
 addBox(wallM, 0, 5, -55, 110, 10, 1);
 addBox(wallM, 0, 5, 55, 110, 10, 1);
 addBox(wallM, -55, 5, 0, 1, 10, 110);
 addBox(wallM, 55, 5, 0, 1, 10, 110);

 // Ruined building (hollow shell)
 addBox(wallM, 15, 5, -12, 1, 10, 16); // left wall
 addBox(wallM, 23, 5, -12, 1, 10, 16); // right wall
 addBox(wallM, 19, 5, -4, 8, 10, 1); // back
 addBox(wallM, 19, 9, -12, 8, 1, 16); // roof slab (partial)
 addBox(wallM, 19, 3, -20, 8, 6, 1); // front low wall

 // Sandbag barricades
 addBox(sandM, -8, 0.75, -15, 5, 1.5, 1.2);
 addBox(sandM, -8, 0.75, -13, 5, 1.5, 1.2);
 addBox(sandM, -8, 1.75, -14, 4, 1, 1.2);
 addBox(sandM, -20, 0.75, 5, 1.2, 1.5, 6);
 addBox(sandM, -20, 1.75, 5, 1.2, 1, 5);

 // Rubble piles (irregular boxes)
 for (let i = 0; i < 15; i++) {
 const rx = (Math.random() - 0.5) * 70;
 const rz = (Math.random() - 0.5) * 70;
 const rs = 0.4 + Math.random() * 1.2;
 const rh = 0.3 + Math.random() * 0.7;
 addBox(wallM, rx, rh/2, rz, rs, rh, rs + Math.random()*0.5, Math.random()*Math.PI);
 }

 // Concrete pillars
 for (const [px, pz] of [[-12, -30], [12, 30], [-30, 12], [30, -12]]) {
 addBox(wallM, px, 4, pz, 1.5, 8, 1.5);
 // Point light near each pillar
 const pl = new THREE.PointLight(0xffa060, 0.4, 18);
 pl.position.set(px, 3, pz);
 scene.add(pl);
 }

 // Burned out vehicle (boxes approximation)
 addBox(wallM, -5, 0.8, 15, 4.5, 1.6, 2, 0); // body
 addBox(wallM, -5, 1.6, 15, 3.5, 1.0, 1.9, 0); // cabin
}

// ═══════════════════════════════════════════════
// WEAPON — Realistic-ish rifle
// ═══════════════════════════════════════════════
function buildWeapon() {
 gunGroup = new THREE.Group();

 const darkMetal = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.85, roughness: 0.3 });
 const grip = new THREE.MeshStandardMaterial({ color: 0x2a1a0a, metalness: 0.1, roughness: 0.95 });
 const olive = new THREE.MeshStandardMaterial({ color: 0x3a4a2a, metalness: 0.2, roughness: 0.8 });

 // Receiver / body
 const body = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.09, 0.42), darkMetal);
 body.position.set(0, 0, 0);
 gunGroup.add(body);

 // Barrel
 const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.015, 0.38, 8), darkMetal);
 barrel.rotation.x = Math.PI / 2;
 barrel.position.set(0, 0.015, -0.36);
 gunGroup.add(barrel);

 // Muzzle device
 const muzzle = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, 0.04, 8), darkMetal);
 muzzle.rotation.x = Math.PI / 2;
 muzzle.position.set(0, 0.015, -0.56);
 gunGroup.add(muzzle);

 // Stock
 const stock = new THREE.Mesh(new THREE.BoxGeometry(0.045, 0.07, 0.22), olive);
 stock.position.set(0, -0.01, 0.22);
 gunGroup.add(stock);

 // Grip
 const pistolGrip = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.1, 0.06), grip);
 pistolGrip.position.set(0, -0.08, 0.08);
 pistolGrip.rotation.x = 0.2;
 gunGroup.add(pistolGrip);

 // Mag
 const mag = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.12, 0.055), darkMetal);
 mag.position.set(0, -0.11, 0.03);
 gunGroup.add(mag);

 // Rail / scope base
 const rail = new THREE.Mesh(new THREE.BoxGeometry(0.065, 0.015, 0.25), darkMetal);
 rail.position.set(0, 0.052, -0.1);
 gunGroup.add(rail);

 // Iron sight rear
 const sightR = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.025, 0.01), darkMetal);
 sightR.position.set(0, 0.068, 0.05);
 gunGroup.add(sightR);

 gunGroup.position.copy(defGunPos);
 camera.add(gunGroup);
 gunMesh = gunGroup;

 muzzleLight = new THREE.PointLight(0xffaa44, 0, 4);
 muzzleLight.position.set(0, 0.015, -0.6);
 gunGroup.add(muzzleLight);
}

// ═══════════════════════════════════════════════
// HUD HELPERS
// ═══════════════════════════════════════════════
function buildAmmoPips() {
 const wrap = document.getElementById('ammo-pips');
 wrap.innerHTML = '';
 for (let i = 0; i < player.maxAmmo; i++) {
 const pip = document.createElement('div');
 pip.className = 'pip active';
 pip.dataset.i = i;
 wrap.appendChild(pip);
 }
}

function updateHUD() {
 const hp = Math.max(0, player.health);
 document.getElementById('health-val').textContent = hp;
 document.getElementById('health-bar').style.width = hp + '%';
 document.getElementById('health-bar').style.background =
 hp > 60 ? '#6aaa2a' : hp > 30 ? '#ccaa22' : '#cc3322';

 document.getElementById('ammo-count').textContent = player.ammo;
 document.getElementById('ammo-reserve').textContent = '/ ' + player.maxAmmo;

 // Update pips
 document.querySelectorAll('.pip').forEach(pip => {
 pip.classList.toggle('active', parseInt(pip.dataset.i) < player.ammo);
 });

 document.getElementById('wave-val').textContent = String(wave).padStart(2,'0');
 document.getElementById('enemies-val').textContent = enemiesAlive;
}

// ═══════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════
function onKeyDown(e) {
 if (isGameOver) return;
 switch (e.code) {
 case 'KeyW': player.moveF = true; break;
 case 'KeyS': player.moveB = true; break;
 case 'KeyA': player.moveL = true; break;
 case 'KeyD': player.moveR = true; break;
 case 'ShiftLeft':
 player.isRunning = true;
 targetFov = baseFov + 12;
 break;
 case 'KeyC':
 if (player.isRunning && !player.isSliding && !player.isJumping) {
 player.isSliding = true;
 player.slideTimer = player.slideDuration;
 Audio.slide();
 document.getElementById('speed-overlay').style.opacity = '1';
 const fwd = new THREE.Vector3();
 camera.getWorldDirection(fwd); fwd.y = 0; fwd.normalize();
 player.velocity.addScaledVector(fwd, 22);
 }
 break;
 case 'Space':
 if (!player.isJumping && !player.isSliding) {
 player.velocity.y = 10;
 player.isJumping = true;
 }
 break;
 case 'KeyR':
 if (player.ammo < player.maxAmmo && !reloading) {
 reloading = true;
 document.getElementById('reload-text').style.opacity = '1';
 Audio.reload();
 setTimeout(() => {
 player.ammo = player.maxAmmo;
 reloading = false;
 document.getElementById('reload-text').style.opacity = '0';
 updateHUD();
 }, 900);
 }
 break;
 }
}

function onKeyUp(e) {
 switch (e.code) {
 case 'KeyW': player.moveF = false; break;
 case 'KeyS': player.moveB = false; break;
 case 'KeyA': player.moveL = false; break;
 case 'KeyD': player.moveR = false; break;
 case 'ShiftLeft':
 player.isRunning = false;
 targetFov = baseFov;
 break;
 }
}

function onMouseDown(e) {
 if (!controls.isLocked || isGameOver || reloading || player.ammo <= 0) return;
 if (e.button !== 0) return;

 player.ammo--; updateHUD();
 Audio.gunshot();

 // Muzzle flash
 muzzleLight.intensity = 8;

 // Recoil — kick gun down, add pitch offset that eases back
 recoilKick = 0.18;
 recoilPitchTarget += 0.025; // accumulates upward kick

 // Raycast
 const ray = new THREE.Raycaster();
 ray.setFromCamera(new THREE.Vector2(0, 0), camera);

 // Apply recoil BEFORE raycast to feel fair
 const hitboxes = enemies.map(e => e.hitbox);
 const hits = ray.intersectObjects(hitboxes);

 if (hits.length > 0) {
 const enemy = enemies.find(en => en.hitbox === hits[0].object);
 if (enemy) {
 enemy.takeDamage();
 spawnParticles(hits[0].point, 0xcc4422, 8);
 }
 } else {
 const mapHits = ray.intersectObjects(
 scene.children.filter(c => c.isMesh && !hitboxes.includes(c))
 );
 if (mapHits.length > 0) {
 spawnParticles(mapHits[0].point, 0x998877, 6);
 spawnDecal(mapHits[0].point);
 }
 }
}

function spawnDecal(pos) {
 // Bullet mark (small dark square)
 const geo = new THREE.PlaneGeometry(0.12, 0.12);
 const mat = new THREE.MeshBasicMaterial({ color: 0x222222, transparent: true, opacity: 0.7, depthWrite: false });
 const d = new THREE.Mesh(geo, mat);
 d.position.copy(pos).addScalar(0.01);
 scene.add(d);
 setTimeout(() => scene.remove(d), 20000);
}

function spawnParticles(pos, color, count = 10) {
 const pMat = new THREE.MeshBasicMaterial({ color });
 for (let i = 0; i < count; i++) {
 const p = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 0.04), pMat);
 p.position.copy(pos);
 scene.add(p);
 particles.push({
 mesh: p, life: 1,
 vel: new THREE.Vector3(
 (Math.random()-0.5) * 6,
 (Math.random()) * 6 + 2,
 (Math.random()-0.5) * 6
 )
 });
 }
}

// ═══════════════════════════════════════════════
// ENEMY CLASS
// ═══════════════════════════════════════════════
class Enemy {
 constructor(pos, speed) {
 this.health = 3 + Math.floor(wave / 2);
 this.speed = speed;
 this.animTime = Math.random() * 10;

 this.group = new THREE.Group();
 this.group.position.copy(pos);

 const skinM = new THREE.MeshStandardMaterial({ color: 0x5a4030, roughness: 0.9 });
 const uniformM = new THREE.MeshStandardMaterial({ color: 0x3a4a2a, roughness: 1 });
 const bootM = new THREE.MeshStandardMaterial({ color: 0x1a1208, roughness: 1 });

 // Torso
 this.torso = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.1, 0.35), uniformM);
 this.torso.position.y = 1.15; this.torso.castShadow = true;
 this.group.add(this.torso);

 // Head
 this.head = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.42, 0.4), skinM);
 this.head.position.y = 2.0; this.head.castShadow = true;
 this.group.add(this.head);

 // Helmet
 const helmet = new THREE.Mesh(new THREE.BoxGeometry(0.46, 0.25, 0.44), uniformM);
 helmet.position.y = 0.18;
 this.head.add(helmet);

 // Arms & Legs
 const limbGeo = new THREE.BoxGeometry(0.25, 0.9, 0.25);
 limbGeo.translate(0, -0.45, 0);
 const legGeo = new THREE.BoxGeometry(0.28, 1.0, 0.28);
 legGeo.translate(0, -0.5, 0);

 this.armL = new THREE.Mesh(limbGeo, uniformM); this.armL.position.set(-0.5, 1.6, 0);
 this.armR = new THREE.Mesh(limbGeo, uniformM); this.armR.position.set( 0.5, 1.6, 0);
 this.legL = new THREE.Mesh(legGeo, bootM); this.legL.position.set(-0.2, 0.6, 0);
 this.legR = new THREE.Mesh(legGeo, bootM); this.legR.position.set( 0.2, 0.6, 0);
 [this.armL, this.armR, this.legL, this.legR].forEach(l => { l.castShadow = true; this.group.add(l); });

 // Invisible hitbox
 this.hitbox = new THREE.Mesh(
 new THREE.BoxGeometry(1.0, 2.2, 0.7),
 new THREE.MeshBasicMaterial({ visible: false })
 );
 this.hitbox.position.y = 1.1;
 this.group.add(this.hitbox);

 scene.add(this.group);
 this._hitFlash = false;
 }

 takeDamage() {
 this.health--;
 Audio.hit();
 // Flash white
 [this.torso, this.head].forEach(m => m.material.emissive?.set(0xffffff));
 this.torso.material = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 });
 setTimeout(() => {
 if (this.health > 0) {
 this.torso.material = new THREE.MeshStandardMaterial({ color: 0x3a4a2a, roughness: 1 });
 }
 }, 80);
 if (this.health <= 0) this.die();
 }

 die() {
 enemies = enemies.filter(e => e !== this);
 this.group.remove(this.hitbox);
 this.deathTimer = 1.2;
 deadEnemies.push(this);
 enemiesAlive--;
 updateHUD();
 if (enemiesAlive <= 0) {
 wave++;
 setTimeout(startWave, 3500);
 }
 }

 update(dt, pPos) {
 const toPlayer = new THREE.Vector3().subVectors(pPos, this.group.position);
 toPlayer.y = 0;
 const dist = toPlayer.length();
 toPlayer.normalize();

 this.group.position.addScaledVector(toPlayer, this.speed * dt);
 this.group.lookAt(pPos.x, this.group.position.y, pPos.z);

 this.animTime += dt * this.speed * 1.8;
 this.legL.rotation.x = Math.sin(this.animTime) * 0.7;
 this.legR.rotation.x = Math.sin(this.animTime + Math.PI) * 0.7;
 this.armL.rotation.x = Math.sin(this.animTime + Math.PI) * 0.5;
 this.armR.rotation.x = Math.sin(this.animTime) * 0.5;
 this.group.position.y = Math.max(0, Math.abs(Math.sin(this.animTime * 2)) * 0.08);

 if (dist < 1.8 && Math.abs(pPos.y - this.group.position.y) < 2) {
 takeDamage();
 }
 }

 animateDeath(dt) {
 this.deathTimer -= dt;
 this.group.rotation.x = THREE.MathUtils.lerp(this.group.rotation.x, Math.PI * 0.48, dt * 4);
 this.group.position.y -= dt * 1.5;
 if (this.deathTimer <= 0) scene.remove(this.group);
 }
}

// ═══════════════════════════════════════════════
// WAVE SPAWNING
// ═══════════════════════════════════════════════
function startWave() {
 const count = wave * 3 + 2;
 enemiesAlive = count;
 updateHUD();
 let spawned = 0;
 const interval = setInterval(() => {
 if (spawned >= count || isGameOver) { clearInterval(interval); return; }
 const angle = Math.random() * Math.PI * 2;
 const r = 28 + Math.random() * 8;
 const pos = new THREE.Vector3(
 THREE.MathUtils.clamp(camera.position.x + Math.cos(angle) * r, -48, 48),
 0,
 THREE.MathUtils.clamp(camera.position.z + Math.sin(angle) * r, -48, 48)
 );
 enemies.push(new Enemy(pos, 2.5 + wave * 0.4));
 spawned++;
 }, 800);
}

// ═══════════════════════════════════════════════
// PLAYER DAMAGE
// ═══════════════════════════════════════════════
function takeDamage() {
 if (dmgCD || player.isSliding) return;
 player.health -= 20;
 Audio.damage();
 const overlay = document.getElementById('hit-overlay');
 overlay.style.opacity = '1';
 setTimeout(() => overlay.style.opacity = '0', 180);
 updateHUD();
 dmgCD = true;
 setTimeout(() => dmgCD = false, 900);

 if (player.health <= 0) {
 isGameOver = true;
 controls.unlock();
 Audio.stopAmbient();
 document.getElementById('blocker').style.display = 'flex';
 document.getElementById('blocker').innerHTML = `
 <div id="menu-title" style="color:#cc3322">Mission Failed</div>
 <div id="menu-heading" style="color:#cc6644">KIA</div>
 <div style="color:#8a8a6a;font-size:13px;letter-spacing:0.2em">Reload page to restart</div>
 `;
 }
}

// ═══════════════════════════════════════════════
// COLLISION
// ═══════════════════════════════════════════════
function checkCollision(pos) {
 const box = new THREE.Box3(
 new THREE.Vector3(pos.x - player.radius, pos.y - player.currentHeight, pos.z - player.radius),
 new THREE.Vector3(pos.x + player.radius, pos.y + 0.15, pos.z + player.radius)
 );
 return mapBounds.some(b => box.intersectsBox(b));
}

// ═══════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════
function animate() {
 requestAnimationFrame(animate);
 if (isGameOver) { renderer.render(scene, camera); return; }

 const dt = Math.min(clock.getDelta(), 0.05);

 if (!controls.isLocked) { renderer.render(scene, camera); return; }

 // ── Camera recoil (pitch only, via camera object child offset) ──
 recoilPitchTarget = THREE.MathUtils.lerp(recoilPitchTarget, 0, dt * 12);
 recoilPitch = THREE.MathUtils.lerp(recoilPitch, recoilPitchTarget, 0.4);
 // We use gunMesh kick to simulate visual recoil; camera pitch stays in PointerLockControls

 // ── Slide logic ──
 if (player.isSliding) {
 player.slideTimer -= dt;
 player.currentHeight = THREE.MathUtils.lerp(player.currentHeight, player.slideHeight, dt * 10);
 if (player.slideTimer <= 0) {
 player.isSliding = false;
 document.getElementById('speed-overlay').style.opacity = '0';
 }
 } else {
 player.currentHeight = THREE.MathUtils.lerp(player.currentHeight, player.baseHeight, dt * 8);
 }

 // ── Physics ──
 const friction = player.isSliding ? 1.5 : 9.0;
 player.velocity.x -= player.velocity.x * friction * dt;
 player.velocity.z -= player.velocity.z * friction * dt;
 player.velocity.y -= 30.0 * dt; // gravity

 // ── Movement ──
 if (!player.isSliding) {
 const speed = (player.isRunning ? player.sprintSpeed : player.baseSpeed);
 player.direction.set(Number(player.moveR) - Number(player.moveL), 0, Number(player.moveF) - Number(player.moveB));
 player.direction.normalize();

 if (player.moveF || player.moveB) player.velocity.z -= player.direction.z * speed * 8 * dt;
 if (player.moveL || player.moveR) player.velocity.x -= player.direction.x * speed * 8 * dt;
 }

 // ── Apply horizontal movement with collision ──
 const prevPos = camera.position.clone();

 controls.moveRight(-player.velocity.x * dt);
 if (checkCollision(camera.position)) {
 camera.position.x = prevPos.x;
 player.velocity.x = 0;
 }

 controls.moveForward(-player.velocity.z * dt);
 if (checkCollision(camera.position)) {
 camera.position.z = prevPos.z;
 player.velocity.z = 0;
 }

 // ── Apply vertical movement ──
 camera.position.y += player.velocity.y * dt;
 const groundY = player.currentHeight;

 if (camera.position.y <= groundY) {
 camera.position.y = groundY;
 player.velocity.y = 0;
 player.isJumping = false;
 }

 // Clamp to arena
 camera.position.x = THREE.MathUtils.clamp(camera.position.x, -52, 52);
 camera.position.z = THREE.MathUtils.clamp(camera.position.z, -52, 52);

 // ── FOV ──
 camera.fov = THREE.MathUtils.lerp(camera.fov, targetFov, dt * 8);
 camera.updateProjectionMatrix();

 // ── Footsteps ──
 const moving = player.moveF || player.moveB || player.moveL || player.moveR;
 if (moving && !player.isJumping) {
 const rate = player.isRunning ? 0.28 : 0.45;
 footstepTimer += dt;
 if (footstepTimer >= rate) { footstepTimer = 0; Audio.footstep(); }
 } else { footstepTimer = 0; }

 // ── Weapon animations ──
 recoilKick = THREE.MathUtils.lerp(recoilKick, 0, dt * 18);

 if (reloading) {
 gunGroup.rotation.x = THREE.MathUtils.lerp(gunGroup.rotation.x, 0.5, dt * 8);
 gunGroup.position.y = THREE.MathUtils.lerp(gunGroup.position.y, defGunPos.y - 0.12, dt * 8);
 } else {
 // Idle sway
 const t = performance.now() * 0.001;
 const swayX = Math.sin(t * 0.4) * 0.003;
 const swayY = Math.sin(t * 0.7) * 0.002;

 // Bobbing when moving
 let bobY = 0, bobX = 0;
 if (moving && !player.isJumping) {
 bobbingTime += dt * (player.isRunning ? 15 : 9);
 bobY = Math.abs(Math.sin(bobbingTime)) * (player.isRunning ? 0.012 : 0.006);
 bobX = Math.cos(bobbingTime * 0.5) * (player.isRunning ? 0.008 : 0.004);
 }

 // Slide tilt
 const slideRollTarget = player.isSliding ? 0.25 : 0;
 gunGroup.rotation.z = THREE.MathUtils.lerp(gunGroup.rotation.z, slideRollTarget, dt * 8);

 // Recoil kick (pushes gun back/up)
 gunGroup.position.set(
 THREE.MathUtils.lerp(gunGroup.position.x, defGunPos.x + swayX + bobX, dt * 12),
 THREE.MathUtils.lerp(gunGroup.position.y, defGunPos.y + swayY + bobY, dt * 12),
 THREE.MathUtils.lerp(gunGroup.position.z, defGunPos.z + recoilKick * 0.15, dt * 12)
 );
 gunGroup.rotation.x = THREE.MathUtils.lerp(gunGroup.rotation.x, -recoilKick * 0.8, dt * 16);
 }

 // Muzzle flash decay
 if (muzzleLight.intensity > 0) muzzleLight.intensity = Math.max(0, muzzleLight.intensity - dt * 80);

 // ── Enemies ──
 enemies.forEach(en => en.update(dt, camera.position));

 for (let i = deadEnemies.length - 1; i >= 0; i--) {
 deadEnemies[i].animateDeath(dt);
 if (deadEnemies[i].deathTimer <= 0) deadEnemies.splice(i, 1);
 }

 // ── Particles ──
 for (let i = particles.length - 1; i >= 0; i--) {
 const p = particles[i];
 p.life -= dt * 2.5;
 if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); continue; }
 p.vel.y -= 18 * dt;
 p.mesh.position.addScaledVector(p.vel, dt);
 p.mesh.scale.setScalar(p.life * 0.8);
 }

 renderer.render(scene, camera);
}

function onResize() {
 camera.aspect = innerWidth / innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth, innerHeight);
}
</script>
